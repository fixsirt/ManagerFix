  broadcast-leave: "<#1A120B>[AFK] <#FFFFFF>{player}</#FFFFFF> <#E0E0E0>вернулся."
  blocked-command: "<#FF4D00>Команды заблокированы в режиме AFK."

# Warps
warps:
  not-found: "<#FF4D00>Варп <#FFFFFF>{name}</#FFFFFF> не найден."
  teleported: "<#FAA300>Телепортация на варп <#FFFFFF>{name}</#FFFFFF>."
  created: "<#FAA300>Варп <#FFFFFF>{name}</#FFFFFF> создан."
  deleted: "<#E0E0E0>Варп <#FFFFFF>{name}</#FFFFFF> удалён."
  updated: "<#FAA300>Варп <#FFFFFF>{name}</#FFFFFF> обновлён."
  cooldown: "<#E0E0E0>Подождите <#FFFFFF>{seconds}</#FFFFFF> сек. перед следующим телепортом."
  usage-create: "<#E0E0E0>Использование: <#FFFFFF>/warps create <name></#FFFFFF> или <#FFFFFF>/setwarp <name></#FFFFFF>"
  usage-delete: "<#E0E0E0>Использование: <#FFFFFF>/warps delete <name></#FFFFFF> или <#FFFFFF>/delwarp <name></#FFFFFF>"
  warp-usage: "<#E0E0E0>Использование: <#FFFFFF>/warp <name></#FFFFFF>"

# Homes
homes:
  set: "<#FAA300>Дом <#FFFFFF>{name}</#FFFFFF> установлен."
  not-found: "<#FF4D00>У вас нет домов."
  not-found-name: "<#FF4D00>Дом <#FFFFFF>{name}</#FFFFFF> не найден."
  deleted: "<#E0E0E0>Дом <#FFFFFF>{name}</#FFFFFF> удалён."
  teleported: "<#FAA300>Телепортация в дом <#FFFFFF>{name}</#FFFFFF>."
  teleport-wait: "<#FAA300>Телепортация через <#FFFFFF>{seconds}</#FFFFFF> сек. Не двигайтесь!"
  cooldown: "<#E0E0E0>Подождите <#FFFFFF>{seconds}</#FFFFFF> сек. перед следующим телепортом."
  limit-reached: "<#FF4D00>Достигнут лимит домов (<#FFFFFF>{limit}</#FFFFFF>)."
  usage-delhome: "<#E0E0E0>Использование: <#FFFFFF>/delhome <name></#FFFFFF>"
  rename-hint: "<#E0E0E0>Переименование: установите новый дом с другим именем и удалите <#FFFFFF>{name}</#FFFFFF>."

# TPA
tpa:
  sent: "<#FAA300>Запрос телепортации отправлен игроку <#FFFFFF>{player}</#FFFFFF>."
  received: "<#FAA300><#FFFFFF>{player}</#FFFFFF> хочет телепортироваться к вам. /tpaccept или /tpdeny"
  accepted: "<#FAA300>Запрос принят. Телепортация..."
  denied: "<#FF4D00>Запрос отклонён."
  denied-target: "<#E0E0E0>Игрок <#FFFFFF>{player}</#FFFFFF> отклонил запрос."
  expired: "<#FF4D00>Запрос истёк."
  no-request: "<#FF4D00>У вас нет запросов на телепорт."
  cooldown: "<#E0E0E0>Подождите <#FFFFFF>{seconds}</#FFFFFF> сек. перед следующим запросом."
  cancelled-move: "<#FF4D00>Запрос отменён — вы сдвинулись."
  usage: "<#E0E0E0>Использование: <#FFFFFF>/tpa <player></#FFFFFF>"
  self: "<#FF4D00>Нельзя отправить запрос самому себе."

# RTP
rtp:
  searching: "<#FAA300>Поиск безопасного места..."
  success: "<#FAA300>Телепортация!"
  failed: "<#FF4D00>Не удалось найти безопасное место. Попробуйте позже."
  cooldown: "<#E0E0E0>Подождите <#FFFFFF>{seconds}</#FFFFFF> сек. перед следующим RTP."

# Kits
kits:
  received: "<#FAA300>Вы получили кит <#FFFFFF>{name}</#FFFFFF>."
