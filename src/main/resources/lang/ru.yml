# ManagerFix - Russian language (MiniMessage + HEX)
# Цветовая палитра: Grief Orange (#FF4D00), Solar Flare (#FAA300), Scorched Earth (#1A120B), Rust & Blood (#C0280F)
# Акценты: Flame Core (#FF6A22), Hot Ember (#F5D742), Dried Blood (#7A2E1A)
# Премиум: Ancient Bronze (#E38B30), Pure Light (#FFFFFF/#E0E0E0)
# https://docs.adventure.kyori.net/minimessage/format.html

messages:
  no-permission: "<#FF4D00>У вас нет прав!"
  player-only: "<#E0E0E0>Эта команда только для игроков."
  command-player-only: "<#E0E0E0>Эта команда только для игроков."
  player-not-found: "<#FF4D00>Игрок <#FFFFFF>{player}</#FFFFFF> не найден или не в сети."
  module-disabled: "<#7A2E1A>Этот модуль отключён."
  module-enabled: "<#FAA300>Модуль включён."
  reload: "<#FAA300>ManagerFix перезагружен!"
  plugin-info: "<#1A120B>ManagerFix <#FFFFFF>v{version} <#1A120B>| <#E0E0E0>tg:fixsirt"
  gamemode:
    set: "<#FAA300>Режим игры: <#FFFFFF>{mode}</#FFFFFF>."
    set-target: "<#FAA300>Режим игры <#FFFFFF>{mode}</#FFFFFF> для <#FFFFFF>{player}</#FFFFFF>."
  repair:
    done: "<#FAA300>Предметы отремонтированы."
  usage: "<#E0E0E0>Использование: <#FFFFFF>{usage}</#FFFFFF>"
  other:
    blocks:
      workbench: "<#1A120B>Верстак"
      anvil: "<#1A120B>Наковальня"
      stonecutter: "<#1A120B>Камнерез"
      grindstone: "<#1A120B>Точило"
      cartography: "<#1A120B>Картографический стол"
      loom: "<#1A120B>Ткацкий станок"
      enchanting: "<#1A120B>Стол зачарований"

# Menu
menu:
  main-title: "<#1A120B>ManagerFix"
  warps-title: "<#1A120B>Варпы"
  homes-title: "<#1A120B>Дома"
  kits-title: "<#1A120B>Киты"
  banlist-title: "<#1A120B>Список банов"
  worlds-title: "<#1A120B>Миры"
  tpa-confirm-title: "<#1A120B>Запрос TPA"
  names-title: "<#1A120B>Ники"
  modules:
    warps: "<#FFFFFF>Варпы"
    homes: "<#FFFFFF>Дома"
    spawn: "<#FFFFFF>Спавн"
    chat: "<#FFFFFF>Чат"
    tpa: "<#FFFFFF>TPA"
    rtp: "<#FFFFFF>RTP"
    ban: "<#FFFFFF>Баны"
    afk: "<#FFFFFF>AFK"
    kits: "<#FFFFFF>Киты"
    worlds: "<#FFFFFF>Миры"
    tab: "<#FFFFFF>Таб"
    other: "<#FFFFFF>Other"
    announcer: "<#FFFFFF>Объявления"
    names: "<#FFFFFF>Ники"

# Names (module + placeholders)
names:
  usage: "<#E0E0E0>Использование: <#FFFFFF>/nick <ник></#FFFFFF>"
  admin-usage: "<#E0E0E0>Использование: <#FFFFFF>/nickadmin <игрок> <ник|reset></#FFFFFF>"
  set: "<#FAA300>Ник установлен: <#FFFFFF>{nick}</#FFFFFF></#FAA300>"
  changed-self: "<#F5D742>Ваш ник изменён на <#FFFFFF>{nick}</#FFFFFF></#F5D742>"
  changed-admin: "<#F5D742>Вы изменили ник игрока <#FFFFFF>{player}</#FFFFFF> на <#FFFFFF>{nick}</#FFFFFF></#F5D742>"
  changed-notify: "<#C0280F>Ваш ник был изменён администратором на <#FFFFFF>{nick}</#FFFFFF></#C0280F>"
  reset: "<#E0E0E0>Ник сброшен.</#E0E0E0>"
  admin-change-broadcast-msg: "<#E0E0E0>Администратор <#FFFFFF>{admin}</#FFFFFF> изменил ник игрока <#FFFFFF>{player}</#FFFFFF> на <#FFFFFF>{nick}</#FFFFFF></#E0E0E0>"
  too-long: "<#FF4D00>Ник не длиннее <#FFFFFF>{max}</#FFFFFF> символов.</#FF4D00>"
  cooldown: "<#FF4D00>Подождите <#FFFFFF>{seconds}</#FFFFFF> сек. перед сменой ника.</#FF4D00>"
  enter-in-chat: "<#FAA300>Введите в чат новый ник для <#FFFFFF>{player}</#FFFFFF></#FAA300>"
  target-offline: "<#FF4D00>Игрок вышел с сервера.</#FF4D00>"

# AFK
afk:
  enter: "<#E0E0E0>Вы теперь в режиме AFK."
  leave: "<#E0E0E0>Вы вышли из режима AFK."
