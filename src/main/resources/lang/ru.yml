    you: "Вы"
    self: "<#FF4D00>Нельзя отправить личное сообщение самому себе.</#FF4D00>"
    blocked: "<#FF4D00>Вам запрещено отправлять личные сообщения.</#FF4D00>"
  reply:
    usage: "<#E0E0E0>Использование: <#FFFFFF>/r <сообщение></#FFFFFF> — ответить последнему, кто писал вам в ЛС.</#E0E0E0>"
  reply-no-target: "<#FF4D00>Нет кому ответить. Сначала напишите кому-то в ЛС или дождитесь сообщения.</#FF4D00>"
  pmblock:
    usage: "<#E0E0E0>Использование: <#FFFFFF>/pmblock <игрок></#FFFFFF></#E0E0E0>"
    blocked: "<#FAA300>Игроку <#FFFFFF>{player}</#FFFFFF> запрещены личные сообщения.</#FAA300>"
    unblocked: "<#E0E0E0>Игрок <#FFFFFF>{player}</#FFFFFF> снова может писать в ЛС.</#E0E0E0>"
    you-blocked: "<#FF4D00>Вам запретили отправлять личные сообщения.</#FF4D00>"
    you-unblocked: "<#FAA300>Вам снова разрешено отправлять личные сообщения.</#FAA300>"
  ignore:
    usage: "<#E0E0E0>Использование: <#FFFFFF>/ignore add <игрок></#FFFFFF> | <#FFFFFF>/ignore remove <игрок></#FFFFFF> | <#FFFFFF>/ignore list</#FFFFFF></#E0E0E0>"
    added: "<#FAA300>Игрок <#FFFFFF>{player}</#FFFFFF> добавлен в чёрный список — он не сможет писать вам в ЛС.</#FAA300>"
    removed: "<#E0E0E0>Игрок <#FFFFFF>{player}</#FFFFFF> удалён из чёрного списка.</#E0E0E0>"
    list: "<#E0E0E0>Чёрный список: <#FFFFFF>{list}</#FFFFFF></#E0E0E0>"
    list-empty: "<#E0E0E0>Чёрный список пуст.</#E0E0E0>"
    cannot-message: "<#FF4D00>Этот игрок добавил вас в чёрный список.</#FF4D00>"
    already-in: "<#FAA300>Игрок <#FFFFFF>{player}</#FFFFFF> уже в чёрном списке.</#FAA300>"
    not-in: "<#FAA300>Игрок <#FFFFFF>{player}</#FFFFFF> не в чёрном списке.</#FAA300>"
    self: "<#FF4D00>Нельзя добавить себя в чёрный список.</#FF4D00>"
  pm-spy-prefix: "<#1A120B>[PM Spy] </#1A120B>"
  muted: "<#FF4D00>Вы замьючены. <#E0E0E0>До: <#FFFFFF>{until}</#FFFFFF></#E0E0E0>"

