  mode-local: "<#E0E0E0>Режим чата: <#FFFFFF>локальный</#FFFFFF>."
  mode-global: "<#E0E0E0>Режим чата: <#FFFFFF>глобальный</#FFFFFF>."
  local-disabled: "<#E0E0E0>Локальный чат отключён."
