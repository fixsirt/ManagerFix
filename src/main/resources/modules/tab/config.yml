# Tab module — multi-line header/footer, MiniMessage, HEX, PlaceholderAPI, LuckPerms
# Placeholders: %server_online%, %server_tps_1%, %player_ping%, %player_world%, %server_time%
# With PlaceholderAPI: %luckperms_prefix%, %luckperms_suffix%, etc.
# With cluster enabled: %cluster_total_online% (when cluster-placeholders: true)
# Цветовая палитра: Grief Orange (#FF3366), Solar Flare (#00C8FF), Light Background (#F0F4F8), Rust & Blood (#FF3366)

# ========== HEADER (multi-line) ==========
header:
  - "<gradient:#7000FF:#00C8FF>✦ ᴠᴀɴɪʟᴀ sᴜɴs ✦</gradient>"
  - "<#F0F4F8>онᴧᴀйн: <#FF3366>%server_online%</#FF3366> | ᴛᴘs: <#00C8FF>%server_tps_1%</#00C8FF>"
  - "<#F0F4F8>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

# ========== FOOTER (multi-line) ==========
footer:
  - "<#F0F4F8>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
  - "<#F0F4F8>Ваш пинг: <#00C8FF>%player_ping%</#00C8FF> ᴍs"
  - "<#F0F4F8>Мир: <#FF3366>%player_world%</#FF3366>"
  - "<gradient:#7000FF:#00C8FF>https://t.me/vanillasunsteam</gradient>"

# ========== PLAYER FORMAT ==========
# Placeholders: {name}, {displayName}, %luckperms_prefix%, %player_ping%, PlaceholderAPI
# {displayName} = Component from NamesModule (nick with colors)
player-format: "%luckperms_prefix% {displayName}"

# Format when player is AFK (replaces player-format for that player)
afk-format: "<#FF3366>｢𝐀𝐅𝐊｣</#FF3366> <#F0F4F8>%luckperms_prefix%</#F0F4F8> {displayName}"

# ========== UPDATE ==========
# Interval in ticks (20 = 1 sec). Only changed header/footer/names are sent.
update-interval-ticks: 40

# ========== OPTIONS ==========
# Hide vanished players from tab (vanish module: they are already hidden via hidePlayer for non-staff)
hide-vanished: true
# Use %cluster_total_online% when cluster is enabled
cluster-placeholders: true
# PlaceholderAPI cache duration in ticks (0 = no cache)
placeholder-cache-ticks: 0
# Sort tab list by LuckPerms weight, then group, then name (when LuckPerms is present)
sort-by-luckperms: true
