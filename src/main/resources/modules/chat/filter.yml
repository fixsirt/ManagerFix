# 4. МАСКИРОВАННЫЕ ВАРИАНТЫ (специальные паттерны)
masked-patterns:
  # Основные маты с разделителями
  - "х.{0,3}у.{0,3}й"
  - "п.{0,3}и.{0,3}з.{0,3}д.{0,3}а"
  - "б.{0,3}л.{0,3}я.{0,3}д"
  - "е.{0,3}б.{0,3}а"
  - "п.{0,3}и.{0,3}д.{0,3}о.{0,3}р"
  - "с.{0,3}у.{0,3}к"
  - "ш.{0,3}л.{0,3}ю.{0,3}х"
  - "м.{0,3}у.{0,3}д"

  # Twitch variations
  - "n.{0,2}i.{0,2}g.{0,2}g.{0,2}[aeuor]"
  - "f.{0,2}a.{0,2}g+"
  - "f.{0,2}4.{0,2}g+"
  - "ret.{0,2}ard"

  # Цифры вместо букв
  - "[хx]\\d*[уy]\\d*[йi]"
  - "п\\d*и\\d*з\\d*д\\d*а"
  - "б\\d*л\\d*я\\d*д"
  - "е\\d*б\\d*а"
  - "н\\d*и\\d*г\\d*[аe]"
  - "f\\d*a\\d*g"

  # Повторяющиеся буквы
  - "х+у+й+"
  - "п+и+з+д+а+"
  - "б+л+я+д+"
  - "е+б+а+"
  - "с+у+к+а+"

