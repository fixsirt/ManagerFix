# 6. НАСТРОЙКИ
settings:
  # Минимальная длина слова для проверки
  min-word-length: 3

  # Схлопывание повторяющихся букв
  collapse-repeats: true
  repeat-threshold: 2

  # Удалять разделители между буквами
  remove-separators: true

  # Конвертировать leet speak
  convert-leet: true

  # Проверять опечатки (расстояние Левенштейна)
  check-typos: false
  levenshtein-max: 1

  # Чувствительность: SOFT, NORMAL, STRICT
  strictness: "NORMAL"
  # SOFT - только точное совпадение
  # NORMAL - + корневые паттерны
  # STRICT - + маски + опечатки

# 7. ЛОГИРОВАНИЕ
logging:
  enabled: true
  file: "logs/profanity.log"
  # Формат: {date} {time} [{player}] {message} -> {matched}
  format: "[{date} {time}] [{player}] \"{message}\" -> {matched}"

# 8. СООБЩЕНИЯ
messages:
  blocked: "<#FF3366>Ваше сообщение заблокировано: обнаружен запрещённый контент.</#FF3366>"
  censored: "<#FF3366>Внимание: ваше сообщение содержит нецензурные слова.</#FF3366>"
  warned: "<#FF3366>⚠️ Зафиксировано нарушение правил чата. Повторные нарушения приведут к муту.</#FF3366>"
