# ============================================
#   ФИЛЬТР МАТА - ManagerFix Chat Module
# ============================================

# Включить/выключить фильтр
enabled: true

# Действие при обнаружении мата
action: BLOCK
# BLOCK - заблокировать сообщение
# CENSOR - заменить на ***
# WARN - пропустить + предупреждение игроку

# Символ для цензурирования
censor-symbol: "***"

# 1. НОРМАЛИЗАЦИЯ (снятие маскировки)
normalization:
  # Цифры -> похожие буквы
  digit-to-letter:
    "0": "о"
    "1": "и"
    "3": "е"
    "4": "а"
    "5": "с"
    "6": "б"
    "7": "т"
    "8": "в"
    "9": "д"

  # Латиница -> кириллица
  latin-to-cyrillic:
    "a": "а"
    "b": "в"
    "c": "с"
    "e": "е"
    "h": "н"
    "k": "к"
    "m": "м"
    "o": "о"
    "p": "р"
    "t": "т"
    "u": "у"
    "x": "х"
    "y": "у"

  # Разделители для удаления (пробел НЕ удаляем!)
  separators:
    - "."
    - ","
    - "_"
    - "-"
    - "*"
    - "|"
    - "/"
    - "\\"
    - "'"
    - '"'
    - "`"
    - "~"
    - "!"
    - "?"
    - ":"
    - ";"
    - "("
    - ")"
    - "["
    - "]"
    - "{"
    - "}"

