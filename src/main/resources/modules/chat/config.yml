# Chat module configuration
# Placeholders: {badge}, {player}, {message}, {prefix}, {suffix} (Vault if present)
# Цветовая палитра: Neon Pink (#FF3366), Bright Cyan (#00C8FF), Light Background (#F0F4F8), Deep Purple (#7000FF)
# Акценты: Neon Pink (#FF3366), Bright Cyan (#00C8FF), Light Background (#F0F4F8)

# Включить фильтр мата (требуется filter.yml)
filter-enabled: true

# Шаблон отображения текста сообщения во всех форматах. Плейсхолдер {text} — сам текст сообщения.
message-format: "{text}"

# Палитра: Grief Orange и Solar Flare. В форматах {message} подставляется из message-format.
format-local: "<#FF3366>{badge} <#F0F4F8>%luckperms_prefix% <#FF3366>｢<#F0F4F8>{player}</#F0F4F8>｣ <#FF3366>{message}</#FF3366>"
format-global: "<#00C8FF>{badge} <#F0F4F8>%luckperms_prefix% <#00C8FF>｢<#F0F4F8>{player}</#F0F4F8>｣ <#00C8FF>{message}</#00C8FF>"

# Badges in chat: local (radius) and global (! prefix)
badge-local: "｢𝐋｣"
badge-global: "｢𝐆｣"
# PM: градиент Grief Orange – Solar Flare. Плейсхолдеры: {badge}, {sender}, {receiver}, {message} (из message-format)
badge-pm: "｢𝐏𝐌｣"
format-pm: "<gradient:#7000FF:#00C8FF>{badge}</gradient> <#FF3366>{sender}</#FF3366> → <#FF3366>{receiver}</#FF3366>: {message} <click:suggest_command:'/r '><hover:show_text:'<#F0F4F8>Кликните чтобы ответить!<#F0F4F8>'><#FF3366>[⬅]</#FF3366></hover></click> "
# Звуки при отправке и получении ЛС (имя из org.bukkit.Sound; пусто или "none" — без звука)
pm-sounds-enabled: true
pm-sound-send: "ENTITY_EXPERIENCE_ORB_PICKUP"
pm-sound-receive: "BLOCK_NOTE_BLOCK_PLING"

# Local chat by default: only players within this radius see message (0 = only global)
# Prefix message with ! to send to global (e.g. "!hello")
local-radius: 60
# Звуки локального чата (сообщения в радиусе): при отправке и при получении. org.bukkit.Sound; пусто или "none" — без звука.
local-chat-sounds-enabled: true
local-sound-send: "ENTITY_EXPERIENCE_ORB_PICKUP"
local-sound-receive: "BLOCK_NOTE_BLOCK_HAT"

# Spam cooldown in seconds (0 = disabled)
spam-cooldown: 2

# Send a short note to sender after global message (helps when another plugin shows "ошибка проверки чата")
global-sent-note-enabled: false

# Colors allowed for players (without permission)
colors-enabled: true

# При наведении на ник в чате: тултип с балансом (Vault) и «Нажмите ЛКМ — личное сообщение». Placeholders: {player}, {balance}
hover-enabled: true
hover-format: |
  <#F0F4F8>Баланс: <#00C8FF>{balance}</#00C8FF>
  <#F0F4F8>Нажмите ЛКМ — личное сообщение <#F0F4F8>{player}</#F0F4F8></#F0F4F8>

# При наведении на текст сообщения: время отправки. ПКМ — скопировать текст. Placeholder: {time}
message-hover-enabled: true
message-hover-format: "<#F0F4F8>Отправлено: <#F0F4F8>{time}</#F0F4F8>\nЛКМ — скопировать сообщение</#F0F4F8>"
message-hover-time-format: "HH:mm"

# Join / quit / death. Placeholder: {player}. Ванильное сообщение о смерти не показывается.
format-join: "<#F0F4F8>[<#00C8FF>+<#F0F4F8>] <#F0F4F8>{player}<#00C8FF> <#00C8FF>зᴀшел ʜᴀ ᴄᴇᴘʙᴇᴘ<#00C8FF>"
format-quit: "<#F0F4F8>[<#FF3366>-<#F0F4F8>] <#F0F4F8>{player}<#00C8FF> <#00C8FF>ʙышᴇл ᴄ ᴄᴇᴘʙᴇᴘᴀ<#00C8FF>"
format-death: "<#F0F4F8>[<#FF3366>💀<#F0F4F8>] <#F0F4F8>{player}<#00C8FF> <#00C8FF>пᴏгиб.<#00C8FF>"

# Broadcast (объявление)
broadcast:
  enabled: true
  sound: "UI_TOAST_CHALLENGE_COMPLETE"
  sound-volume: 1.0
  sound-pitch: 1.0
  title: "<gradient:#7000FF:#00C8FF>Объявление</gradient>"
  chat-format: "<gradient:#7000FF:#00C8FF>⬤</gradient> <#F0F4F8>Объявление от</#F0F4F8> <#00C8FF>{player}</#00C8FF>:"
