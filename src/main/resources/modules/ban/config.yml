# Ban module configuration
default-duration: permanent
broadcast-bans: true
# Also broadcast mute events
broadcast-mutes: true

# Kick message (MiniMessage), {reason} placeholder
# Цветовая палитра: Neon Pink (#FF3366), Bright Cyan (#00C8FF), Dark Blue-Gray (#1E2A3A), Deep Purple (#7000FF)
kick-message: "<color:#FF3366>Вы забанены. Причина: <color:#00C8FF>{reason}</color></color>"

# Formats for broadcasts (MiniMessage).
# Available placeholders:
# {targetReal}, {targetNick}, {sourceReal}, {sourceNick}, {reason}, {duration}
format:
  ban-broadcast: "<color:#1E2A3A>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</color>\n<color:#FF3366>⛔ БАН</color>\n<color:#F0F4F8>Игрок:</color> <color:#F0F4F8>{targetReal}</color>\n<color:#F0F4F8>Забанил:</color> <color:#F0F4F8>{sourceReal}</color>\n<color:#F0F4F8>На:</color> <color:#00C8FF>{duration}</color>\n<color:#F0F4F8>Причина:</color> <color:#00C8FF>{reason}</color>\n<color:#1E2A3A>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</color>"
  kick-broadcast: "<color:#1E2A3A>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</color>\n<color:#00C8FF>⬤ КИК</color>\n<color:#F0F4F8>Игрок:</color> <color:#F0F4F8>{targetReal}</color>\n<color:#F0F4F8>Кикнул:</color> <color:#F0F4F8>{sourceReal}</color>\n<color:#F0F4F8>Причина:</color> <color:#FF3366>{reason}</color>\n<color:#1E2A3A>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</color>"
  mute-broadcast: "<color:#1E2A3A>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</color>\n<color:#FF3366>🔇 МУТ</color>\n<color:#F0F4F8>Игрок:</color> <color:#F0F4F8>{targetReal}</color>\n<color:#F0F4F8>Замутил:</color> <color:#F0F4F8>{sourceReal}</color>\n<color:#F0F4F8>На:</color> <color:#00C8FF>{duration}</color>\n<color:#F0F4F8>Причина:</color> <color:#00C8FF>{reason}</color>\n<color:#1E2A3A>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</color>"
  ip-ban-broadcast: "<color:#1E2A3A>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</color>\n<color:#FF3366>⛔ IP БАН</color>\n<color:#F0F4F8>Игрок:</color> <color:#F0F4F8>{targetReal}</color>\n<color:#F0F4F8>IP:</color> <color:#F0F4F8>{ip}</color>\n<color:#F0F4F8>Забанил:</color> <color:#F0F4F8>{sourceReal}</color>\n<color:#F0F4F8>На:</color> <color:#00C8FF>{duration}</color>\n<color:#F0F4F8>Причина:</color> <color:#00C8FF>{reason}</color>\n<color:#1E2A3A>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</color>"
  ip-unban-broadcast: "<color:#1E2A3A>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</color>\n<color:#00C8FF>⬤ IP РАЗБАН</color>\n<color:#F0F4F8>IP:</color> <color:#F0F4F8>{ip}</color>\n<color:#F0F4F8>Разбанил:</color> <color:#F0F4F8>{sourceReal}</color>\n<color:#1E2A3A>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</color>"
