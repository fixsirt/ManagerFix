name: ManagerFix
version: 1.0.0
main: ru.managerfix.ManagerFix
api-version: '1.21'
author: tg:fixsirt
load: POSTWORLD

softdepend:
  - Vault
  - LuckPerms
  - PlaceholderAPI
  - ProtocolLib

commands:
  managerfix:
    description: Main ManagerFix command (reload, menu)
    usage: /<command> [reload|menu]
    permission: managerfix.command.managerfix
  i:
    description: Команды манипуляции предметами
    usage: /<command> <подкоманда> [аргументы]
    permission: managerfix.items.use
  warps:
    description: Warps - list, create, delete, or open GUI
    usage: /<command> [create|delete] [name]
  warp:
    description: Teleport to a warp
    usage: /<command> <name>
  setwarp:
    description: Create a warp at current location
    usage: /<command> <name>
  delwarp:
    description: Delete a warp
    usage: /<command> <name>
  editwarp:
    description: Edit a warp properties
    usage: /<command> <name>
  sethome:
    description: Set a home
    usage: /<command> [name]
  home:
    description: Teleport to home
    usage: /<command> [name]
  delhome:
    description: Delete a home
    usage: /<command> <name>
  homes:
    description: Open homes GUI
    usage: /<command>
  adminhomes:
    description: Open player's homes GUI (admin)
    usage: /<command> <player>
  adminsethome:
    description: Set a home for target player at your location (admin)
    usage: /<command> <player> <home_name>
  tpa:
    description: Request teleport to player
    usage: /<command> <player>
  tpahere:
    description: Request player to teleport to you
    usage: /<command> <player>
  tpaccept:
    description: Accept TPA request
    usage: /<command>
  tpdeny:
    description: Deny TPA request
    usage: /<command>
  tpadeny:
    description: Deny TPA request
    usage: /<command>
  tpatoggle:
    description: Toggle receiving TPA requests
    usage: /<command>
  tpablacklist:
    description: TPA blacklist (add/remove/list)
    usage: /<command> [add|remove|list] [player]
  tpareply:
    description: Open TPA request GUI (click message)
    usage: /<command>
  rtp:
    description: Random teleport
    usage: /<command>
  kit:
    description: Get a kit
    usage: /<command> [name]
  kits:
    description: Open kits GUI
    usage: /<command>
  editkits:
    description: Admin GUI for managing kits
    usage: /<command>
  fly:
    description: Toggle fly mode
    usage: /<command>
  heal:
    description: Heal yourself or target
    usage: /<command> [player]
  feed:
    description: Feed yourself or target
    usage: /<command> [player]
  god:
    description: Toggle god mode
    usage: /<command>
  workbench:
    description: Open crafting table
    usage: /<command>
  enderchest:
    description: Open ender chest
    usage: /<command>
    aliases: [ec]
    permission: managerfix.other.ec
  invsee:
    description: View player inventory
    usage: /<command> <player>
  ecsee:
    description: View player ender chest
    usage: /<command> <player>
  vanish:
    description: Toggle vanish mode
    usage: /<command>
  sudo:
    description: Run command as player
    usage: /<command> <player> <command...>
  afk:
    description: Toggle AFK state
    usage: /<command>
  top:
    description: Top lists (AFK time)
    usage: /<command> [afk]
  ban:
    description: Ban a player
    usage: /<command> <player> [time] [reason]
  unban:
    description: Unban a player
    usage: /<command> <player>
  banip:
    description: Ban player by IP
    usage: /<command> <player> <time> <reason>
  unbanip:
    description: Unban player by IP
    usage: /<command> <ip|player>
  banlist:
    description: Open bans GUI
    usage: /<command>
  spawn:
    description: Teleport to spawn
    usage: /<command>
  setspawn:
    description: Set world spawn
    usage: /<command>
  editspawn:
    description: Edit spawn settings GUI
    usage: /<command>
  chattoggle:
    description: Toggle local/global chat
    usage: /<command>
  chatspy:
    description: Toggle seeing local chat (when not in radius)
    usage: /<command>
  commandspy:
    description: Toggle seeing other players' commands
    usage: /<command>
  pm:
    description: Send a private message to a player
    usage: /<command> <player> <message>
  tell:
    description: Send a private message to a player
    usage: /<command> <player> <message>
  msg:
    description: Send a private message to a player
    usage: /<command> <player> <message>
  r:
    description: Quick reply to last PM partner
    usage: /<command> <message>
  pmblock:
    description: Block/unblock a player from sending PMs
    usage: /<command> <player>
  ignore:
    description: Ignore list (add/remove players who cannot PM you)
    usage: /<command> [add|remove|list] [player]
  mute:
    description: Mute a player
    usage: /<command> <player> [time] [reason]
  unmute:
    description: Unmute a player
    usage: /<command> <player>
  clearchat:
    description: Clear chat
    usage: /<command>
    aliases: [chatchlear]
  socialspy:
    description: Toggle social spy
    usage: /<command>
  world:
    description: Worlds - GUI, tp, create, delete
    usage: /<command> [tp|create|delete] [name] [generator]
  nick:
    description: Change your nickname
    usage: /<command> <nickname>
    permission: managerfix.names.nick
  nickadmin:
    description: Change or reset another player's nick
    usage: /<command> <player> <name|reset>
  names:
    description: Open nick admin GUI
    usage: /<command>
  hidenick:
    description: Hide/show your nick and prefix above head
    usage: /<command>
  gmc:
    description: Gamemode creative
    usage: /<command> [player]
  gms:
    description: Gamemode survival
    usage: /<command> [player]
  gmsp:
    description: Gamemode spectator
    usage: /<command> [player]
  repair:
    description: Repair item or all
    usage: /<command> [all] [player]
  anvil:
    description: Open anvil
    usage: /<command>
  stonecutter:
    description: Open stonecutter
    usage: /<command>
  grindstone:
    description: Open grindstone
    usage: /<command>
  cartography:
    description: Open cartography table
    usage: /<command>
  loom:
    description: Open loom
    usage: /<command>
  enchanting:
    description: Open enchanting table
    usage: /<command>
  killmob:
    description: Kill mobs by type in radius
    usage: /<command> <type> <radius>
  spawnmob:
    description: Spawn mobs by type
    usage: /<command> <type> <amount>
  tp:
    description: Teleport to player or location
    usage: /<command> to <name> | here <name> | location <x> <y> <z> | top
  near:
    description: List nearby players
    usage: /<command>
  v:
    description: Toggle vanish
    usage: /<command>
  back:
    description: Teleport back
    usage: /<command>
  dback:
    description: Teleport to death location
    usage: /<command>
  weather:
    description: Change weather
    usage: /<command> <clear|rain|thunder>
  day:
    description: Set day time
    usage: /<command>
  night:
    description: Set night time
    usage: /<command>
  sun:
    description: Set sunny weather
    usage: /<command>
  rain:
    description: Set rain
    usage: /<command>
  thunder:
    description: Set thunder
    usage: /<command>
  health:
    description: Show health
    usage: /<command> [player]
  food:
    description: Feed or food god
    usage: /<command> [player|god]
  clear:
    description: Clear inventory
    usage: /<command> [player]
  give:
    description: Give item to player
    usage: /<command> <player> <item> <amount>
  pinfo:
    description: Player info
    usage: /<command> <player>
  freeze:
    description: Freeze player
    usage: /<command> <player>
  lockchat:
    description: Toggle chat lock
    usage: /<command>
  broadcast:
    description: Broadcast message
    usage: /<command> <message>
  ping:
    description: Show ping
    usage: /<command> [player]
  coords:
    description: Show coordinates
    usage: /<command>
  seen:
    description: Show last seen
    usage: /<command> <player>
  pull:
    description: Pull player to you
    usage: /<command> <player>
  push:
    description: Push yourself to player
    usage: /<command> <player>
  speed:
    description: Set speed
    usage: /<command> <value>
  kick:
    description: Kick a player
    usage: /<command> <player> [reason]
  cc:
    description: Clear chat
    usage: /<command>
  migrate:
    description: Migrate data between YAML and MySQL
    usage: /<command> <yaml2sql|sql2yaml>

permissions:
  managerfix.admin:
    description: Full access to ManagerFix admin panel (/managerfix menu)
    default: op
  managerfix.reload:
    description: Reload ManagerFix config and modules
    default: op
  managerfix.module.toggle:
    description: Toggle modules via GUI (Shift+RMB in main menu)
    default: op
  managerfix.menu:
    description: Open ManagerFix main menu
    default: op
